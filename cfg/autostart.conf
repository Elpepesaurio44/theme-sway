# Variables de entorno para DBus y portales (1 sola vez)
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway
exec --no-startup-id /usr/lib/xdg-desktop-portal &

# Fondo de pantalla (dinámico con Pywal)
exec_always swaybg -i $(cat $HOME/.cache/wal/wal) -m fill

# Waybar (reinicia al recargar config)
exec_always pkill waybar; waybar

# SwayIdle (descomenta si lo usas)
exec swayidle -w \
    timeout 300 'swaylock --screenshots --clock --indicator --indicator-radius 100 --indicator-thickness 7 --effect-blur 15x10 --effect-vignette 0.5:0.5 --ring-color bb00cc --key-hl-color 880033' \
    timeout 600 'swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
    before-sleep 'swaylock --screenshots --clock --effect-blur 15x10'

# exec_always wal -R  # Opcional: suele ser redundante con `include ~/.cache/wal/colors-sway`
